services:
  db:
    image: postgres:16-alpine
    container_name: radare-database
    environment:
      POSTGRES_DB: radare
      POSTGRES_USER: radare
      POSTGRES_PASSWORD: radare
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "radare"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    container_name: radare-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=radare
      - DB_PASSWORD=radare
      - DB_NAME=radare
      - DB_SSLMODE=disable
      - JWT_SECRET=radare-super-secret-key-2026
      - PORT=8080

  migrate:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: radare-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=radare
      - DB_PASSWORD=radare
      - DB_NAME=radare
      - DB_SSLMODE=disable
    command: ["up"]

  webapp:
    build:
      context: ./apps/webapp
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    container_name: radare-webapp
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - VITE_API_URL=http://localhost:8080/api

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
