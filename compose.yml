name: radare

services:
  db:
    image: docker.io/library/postgres:18-alpine
    container_name: radare-database
    userns_mode: keep-id
    environment:
      POSTGRES_DB: ${DB_NAME:-radare}
      POSTGRES_USER: ${DB_USER:-radare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-radare}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-radare} -d ${DB_NAME:-radare}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  logdb:
    image: docker.io/library/postgres:18-alpine
    container_name: radare-logdb
    userns_mode: keep-id
    environment:
      POSTGRES_DB: ${LOG_DB_NAME:-radare_logs}
      POSTGRES_USER: ${DB_USER:-radare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-radare}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - logdb_data:/var/lib/postgresql/data:Z
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-radare} -d ${LOG_DB_NAME:-radare_logs}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: radare-redis
    userns_mode: keep-id
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: radare-backend
    userns_mode: keep-id
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
      logdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-radare}
      DB_PASSWORD: ${DB_PASSWORD:-radare}
      DB_NAME: ${DB_NAME:-radare}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: ${PORT:-8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_DB_URL: postgresql://${DB_USER:-radare}:${DB_PASSWORD:-radare}@logdb:5432/${LOG_DB_NAME:-radare_logs}?sslmode=disable
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-radare-ingest}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-radare}
      INFLUX_URL: ${INFLUX_URL:-}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-}
      INFLUX_ORG: ${INFLUX_ORG:-}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-}
      INFLUX_POLL_INTERVAL: ${INFLUX_POLL_INTERVAL:-30s}

  webapp:
    build:
      context: ./apps/webapp
      dockerfile: Dockerfile
    container_name: radare-webapp
    userns_mode: keep-id
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}

volumes:
  postgres_data:
    driver: local
  logdb_data:
    driver: local
  postgres_backups:
    driver: local

