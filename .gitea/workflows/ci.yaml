name: CI
run-name: CI - ${{ gitea.actor }} - ${{ gitea.ref_name }}

on:
  push:
    branches:
      - main
      - development
  pull_request:
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Setup Go
        run: |
          for GO_DIR in /opt/hostedtoolcache/go/*/x64/bin /usr/local/go/bin /usr/bin /usr/local/bin /snap/bin; do
            if [ -x "${GO_DIR}/go" ]; then
              echo "${GO_DIR}" >> $GITHUB_PATH
              export PATH="${GO_DIR}:$PATH"
              go version
              exit 0
            fi
          done
          exit 1

      - name: Build backend
        working-directory: apps/backend
        env:
          GOWORK: "off"
        run: go build ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Build frontend
        working-directory: apps/webapp
        run: |
          npm ci
          VITE_API_URL=https://api-radare.nilbyte.com.br/api npm run build

  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config --quiet

  build-images:
    needs:
      - build-backend
      - build-frontend
      - validate-compose
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        run: |
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.PACKAGES_TOKEN }}@gitea.nilbyte.com.br" > ~/.git-credentials
          git clone --depth=1 --branch "${{ gitea.ref_name }}" \
            "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Resolve Gitea registry endpoint
        run: |
          GITEA_IP=$(docker network inspect nilbyte-git \
            --format '{{range .Containers}}{{if eq .Name "gitea"}}{{.IPv4Address}}{{end}}{{end}}' \
            | cut -d/ -f1)
          REGISTRY="${GITEA_IP}:3000"
          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ gitea.sha }}" >> $GITHUB_ENV

      - name: Login to Gitea registry
        run: |
          echo "${{ secrets.PACKAGES_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u notNilton --password-stdin

      - name: Build and push backend image
        run: |
          docker build -f apps/backend/Dockerfile \
            -t "${{ env.REGISTRY }}/nilbyte-studios/radare/backend:latest" \
            -t "${{ env.REGISTRY }}/nilbyte-studios/radare/backend:${{ env.IMAGE_TAG }}" \
            ./apps/backend
          docker push "${{ env.REGISTRY }}/nilbyte-studios/radare/backend:latest"
          docker push "${{ env.REGISTRY }}/nilbyte-studios/radare/backend:${{ env.IMAGE_TAG }}"

      - name: Build and push frontend image
        run: |
          docker build -f apps/webapp/Dockerfile \
            -t "${{ env.REGISTRY }}/nilbyte-studios/radare/frontend:latest" \
            -t "${{ env.REGISTRY }}/nilbyte-studios/radare/frontend:${{ env.IMAGE_TAG }}" \
            ./apps/webapp
          docker push "${{ env.REGISTRY }}/nilbyte-studios/radare/frontend:latest"
          docker push "${{ env.REGISTRY }}/nilbyte-studios/radare/frontend:${{ env.IMAGE_TAG }}"
